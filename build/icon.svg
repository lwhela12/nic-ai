<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#1e3a5f"/>

  <!-- Scales of justice - balance beam -->
  <rect x="118" y="50" width="20" height="8" fill="#d4a853"/>
  <rect x="124" y="50" width="8" height="100" fill="#d4a853"/>

  <!-- Left scale pan -->
  <line x1="50" y1="58" x2="128" y2="54" stroke="#d4a853" stroke-width="3"/>
  <ellipse cx="50" cy="100" rx="35" ry="12" fill="none" stroke="#d4a853" stroke-width="4"/>
  <line x1="50" y1="58" x2="50" y2="88" stroke="#d4a853" stroke-width="3"/>
  <line x1="18" y1="88" x2="82" y2="88" stroke="#d4a853" stroke-width="3"/>

  <!-- Right scale pan -->
  <line x1="206" y1="58" x2="128" y2="54" stroke="#d4a853" stroke-width="3"/>
  <ellipse cx="206" cy="100" rx="35" ry="12" fill="none" stroke="#d4a853" stroke-width="4"/>
  <line x1="206" y1="58" x2="206" y2="88" stroke="#d4a853" stroke-width="3"/>
  <line x1="174" y1="88" x2="238" y2="88" stroke="#d4a853" stroke-width="3"/>

  <!-- Base/pillar -->
  <rect x="108" y="150" width="40" height="10" fill="#d4a853"/>
  <polygon points="88,210 168,210 158,160 98,160" fill="#d4a853"/>

  <!-- PI text -->
  <text x="128" y="195" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#1e3a5f" text-anchor="middle">PI</text>
</svg>
